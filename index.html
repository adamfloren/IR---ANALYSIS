      font-size: 11px;

    function CitationTag({ label, title, href }) {
      return (
        <span className="cite-wrap">
          <a
            href={href}
            target="_blank"
            rel="noopener noreferrer"
            style={{ fontSize:"0.65rem", verticalAlign:"super" }}
            className="font-mono text-blue-400 hover:text-blue-600 ml-0.5"
          >
            [{label}]
          </a>
          <span className="cite-tip">{title}</span>
        </span>
      );
    }

    function LevelBadge({ level, lang }) {
      const label = L[lang][level];
      const cls = {
        individual: "bg-blue-100 text-blue-700 border-blue-200",
        state:      "bg-green-100 text-green-700 border-green-200",
        systemic:   "bg-purple-100 text-purple-700 border-purple-200",
      }[level];
      return (
        <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold border ${cls}`}>
          {label}
        </span>
      );
    }

    function ProgressBar() {
      const [pct, setPct] = useState(0);
      useEffect(() => {
        const onScroll = () => {
          const el = document.documentElement;
          setPct(Math.min((el.scrollTop / (el.scrollHeight - el.clientHeight)) * 100, 100));
        };
        window.addEventListener("scroll", onScroll, { passive: true });
        return () => window.removeEventListener("scroll", onScroll);
      }, []);
      return <div id="progress-bar" style={{ width: `${pct}%` }} />;
    }

    function Accordion({ title, subtitle, defaultOpen = false, accent = "blue", children }) {
      const [open, setOpen] = useState(defaultOpen);
      const border = { blue:"border-blue-400", green:"border-green-400", purple:"border-purple-400" }[accent];
      return (
        <div className={`bg-white rounded-xl border border-gray-200 border-s-4 ${border} mb-4 shadow-sm overflow-hidden`}>
          <button
            className="w-full text-start px-6 py-5 flex items-center justify-between gap-4 hover:bg-gray-50 transition-colors"
            onClick={() => setOpen(o => !o)}
          >
            <div>
              <div className="font-semibold text-gray-900">{title}</div>
              {!open && <div className="text-sm text-gray-400 mt-0.5">{subtitle}</div>}
            </div>
            <span className={`chevron text-gray-400 text-xl flex-shrink-0 ${open ? "open" : ""}`}>▾</span>
          </button>
          <div className={`accordion-content ${open ? "open" : ""}`}>
            <div className="px-6 pb-6 pt-1">{children}</div>
          </div>
        </div>
      );
    }

    const IR_KW = ["china","russia","nato","ukraine","iran","israel","taiwan","korea","nuclear","sanction","treaty","war","conflict","military","diplomacy","pentagon","kremlin","security council","united nations","geopolit"];

    function isIR(item) {
      const txt = `${item.title} ${item.description || ""}`.toLowerCase();
      return IR_KW.some(kw => txt.includes(kw));
    }

    function ago(ds) {
      const h = Math.floor((Date.now() - new Date(ds)) / 3600000);
      return h < 1 ? "< 1h ago" : h < 24 ? `${h}h ago` : `${Math.floor(h/24)}d ago`;
    }

    function Skeleton() {
      return (
        <div className="bg-white rounded-xl p-4 border border-gray-100">
          <div className="skeleton h-4 w-3/4 mb-2" /><div className="skeleton h-3 w-1/3" />
        </div>
      );
    }

    function LiveNewsFeed({ lang }) {
      const lbl = L[lang];
      const [items, setItems]     = useState([]);
      const [loading, setLoading] = useState(true);
      const [error,   setError]   = useState(false);

      const FEEDS = [
        "https://feeds.bbci.co.uk/news/world/rss.xml",
        "https://rss.nytimes.com/services/xml/rss/nyt/World.xml",
      ];

      const fetch_ = async () => {
        setLoading(true); setError(false);
        for (const feed of FEEDS) {
          try {
            const r = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed)}&count=40`);
            const d = await r.json();
            if (d.status === "ok" && d.items?.length) {
              const filtered = d.items.filter(isIR).slice(0, 6);
              if (filtered.length) { setItems(filtered); setLoading(false); return; }
            }
          } catch {}
        }
        setError(true); setLoading(false);
      };

      useEffect(() => { fetch_(); }, []);

      return (
        <div className="mt-10 border-t border-gray-200 pt-8">
          <div className="flex items-center justify-between mb-4">
            <div>
              <h2 className="text-lg font-bold text-gray-900">{lbl.liveNews}</h2>
              <p className="text-sm text-gray-400">{lbl.liveNewsSub}</p>
            </div>
            <button
              onClick={fetch_}
              className="text-xs text-blue-500 border border-blue-200 rounded-lg px-3 py-1 hover:bg-blue-50 transition-colors"
            >
              ↻ {lbl.refresh}
            </button>
          </div>

          {loading && (
            <div className="grid gap-3 sm:grid-cols-2 lg:grid-cols-3">
              {[...Array(6)].map((_,i) => <Skeleton key={i} />)}
            </div>
          )}

          {error && (
            <div className="text-center py-8 text-gray-400">
              <p className="mb-2">{lbl.noNews}</p>
              <button onClick={fetch_} className="text-sm text-blue-500 hover:underline">{lbl.retry}</button>
            </div>
          )}

          {!loading && !error && (
            <div className="grid gap-3 sm:grid-cols-2 lg:grid-cols-3">
              {items.map((item, i) => (
                <a
                  key={i}
                  href={item.link}
                  target="_blank"
                  rel="noopener noreferrer"
                  className="hoverable bg-white rounded-xl p-4 border border-gray-100 block hover:border-blue-200"
                  style={{ textDecoration:"none" }}
                >
                  <p className="text-sm font-medium text-gray-800 mb-2 leading-snug" style={{ display:"-webkit-box", WebkitLineClamp:3, WebkitBoxOrient:"vertical", overflow:"hidden" }}>
                    {item.title}
                  </p>
                  <div className="flex items-center justify-between">
                    <span className="text-xs text-gray-400">{ago(item.pubDate)}</span>
                    <span className="text-xs text-blue-500">{lbl.readMore}</span>
                  </div>
                </a>
              ))}
            </div>
          )}
        </div>
      );
    }

                      <span className="inline-block px-1 py-0.5 rounded text-xs font-bold bg-red-100 text-red-600 leading-none">●</span>
                    )}
                  </span>
                  <span>{iss.meta.title[lang]}</span>
                </button>
              ))}
            </div>

            {/* Issue header */}
            <div className="mb-8">
              <div className="text-7xl font-black text-gray-100 leading-none mb-1" aria-hidden="true">
                {issue.meta.number}
              </div>
              <h1 className="text-2xl font-bold text-gray-900 leading-tight mb-1">{issue.meta.title[lang]}</h1>
              <p className="text-gray-500 mb-3">{issue.meta.subtitle[lang]}</p>
              <div className="flex flex-wrap gap-2 mb-2">
                {issue.meta.tags[lang].map(t => (
                  <span key={t} className="px-3 py-0.5 bg-gray-100 text-gray-600 rounded-full text-xs font-medium">{t}</span>
                ))}
              </div>
              <p className="text-xs text-gray-400">{lbl.lastUpdated}: {issue.meta.lastUpdated}</p>
              <div className="border-t border-gray-200 mt-4" />
            </div>

            {/* Sections */}
            <Accordion title={lbl.landscape} subtitle={lbl.landscapeSub} defaultOpen={true}  accent="blue">
              <LandscapeSection data={issue.landscape} lang={lang} />
            </Accordion>

            <Accordion title={lbl.analysis}  subtitle={lbl.analysisSub}  defaultOpen={false} accent="green">
              <AnalysisSection data={issue.analysis} lang={lang} />
            </Accordion>

            <Accordion title={lbl.historical} subtitle={lbl.historicalSub} defaultOpen={false} accent="purple">
              <HistoricalMirror data={issue.historical} lang={lang} />
            </Accordion>

            {/* Live news */}
            <LiveNewsFeed lang={lang} />

            {/* Footer */}
            <footer className="mt-12 pt-6 border-t border-gray-200 text-xs text-gray-400 text-center space-y-1">
              <p className="font-medium text-gray-500">{lbl.hostTitle}</p>
              <p className="max-w-sm mx-auto">{lbl.hostBody}</p>
              <p className="mt-4 text-gray-300">{lbl.footer} · {new Date().getFullYear()}</p>
            </footer>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
