name: Daily IR Issue Generator

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python generate_issue.py
      - run: |
          git config user.name "IR Bot"
          git config user.email "ir-bot@users.noreply.github.com"
          git add today.json
          git diff --staged --quiet || git commit -m "Daily IR issue: $(date +%Y-%m-%d)"
          git push
